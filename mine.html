<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 - 山管社联年审</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            'primary-dark': '#1E40AF',
            'campus-blue': '#1D4ED8',
            'warn-red': '#DC2626',
            'success-green': '#16A34A',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #F3F4F6;
      width: 430px;
      margin: 0 auto;
      min-height: 932px;
      overflow-x: hidden;
    }
    .page-container { padding-bottom: 70px; }
  </style>
</head>
<body class="bg-gray-100">

  <!-- 顶部导航栏 -->
  <header class="bg-primary-dark text-white px-4 py-3 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-sm font-bold">社</div>
      <span class="text-lg font-bold tracking-wide">山管社联年审</span>
    </div>
    <div class="text-xs bg-white/20 px-2 py-1 rounded-full">2026</div>
  </header>

  <div class="page-container">

    <!-- ========== 已登录状态 ========== -->
    <!-- 个人信息卡片 -->
    <div class="bg-gradient-to-r from-primary-dark to-campus-blue m-3 rounded-xl p-4 text-white">
      <div class="flex items-center gap-3">
        <!-- 头像 -->
        <div class="w-16 h-16 bg-white/30 rounded-full flex items-center justify-center text-2xl font-bold border-2 border-white/50">
          张
        </div>
        <div class="flex-1">
          <p class="font-bold text-lg">张三</p>
          <div class="flex items-center gap-2 mt-1">
            <span class="bg-white/20 text-xs px-2 py-0.5 rounded-full">社团负责人</span>
            <span class="bg-white/20 text-xs px-2 py-0.5 rounded-full">篮球协会</span>
          </div>
        </div>
        <svg class="w-5 h-5 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </div>
      <!-- 归口盖章单位 -->
      <div class="mt-3 bg-white/15 rounded-lg p-2 flex items-center gap-2">
        <span class="text-sm">🏛</span>
        <span class="text-xs">盖章要求：<strong>按指导老师所属单位盖章</strong></span>
      </div>
    </div>

    <!-- 我的年审 -->
    <div class="px-3">
      <h3 class="text-sm font-bold text-gray-700 mb-2">我的年审</h3>
      <div class="space-y-2">
        <!-- 上传记录 -->
        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              </div>
              <div>
                <p class="text-sm font-bold text-gray-800">2026年年审表_v2.docx</p>
                <p class="text-xs text-gray-500">上传于 5月30日 14:30</p>
              </div>
            </div>
            <span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-full font-bold">校验中</span>
          </div>
        </div>

        <!-- 审核结果 -->
        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-success-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
              <div>
                <p class="text-sm font-bold text-gray-800">初审已通过</p>
                <p class="text-xs text-gray-500">干事：李四 · 5月30日</p>
              </div>
            </div>
            <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full font-bold">已通过</span>
          </div>
          <!-- 指引卡片 -->
          <div class="mt-2 bg-green-50 border border-green-200 rounded-lg p-2 flex items-start gap-2">
            <span class="text-sm">✅</span>
            <p class="text-xs text-green-800">请根据<strong>指导老师所属单位</strong>完成盖章，私章无效。</p>
          </div>
        </div>

        <!-- 待修改文档 -->
        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-warn-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
              </div>
              <div>
                <p class="text-sm font-bold text-gray-800">2026年年审表_v1.docx</p>
                <p class="text-xs text-red-500">需修改：正文格式不匹配</p>
              </div>
            </div>
            <span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded-full font-bold">待修改</span>
          </div>
        </div>

        <!-- 盖章指引卡片 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-3">
          <div class="flex items-center gap-2 mb-1">
            <span>📌</span>
            <span class="text-sm font-bold text-blue-800">盖章指引</span>
          </div>
          <p class="text-xs text-blue-700 leading-relaxed">请根据指导老师所属单位盖章。指导老师若为体育教学部，则盖体育教学部章。</p>
        </div>
      </div>
    </div>

    <!-- 账号设置 -->
    <div class="px-3 mt-4">
      <h3 class="text-sm font-bold text-gray-700 mb-2">账号设置</h3>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden divide-y divide-gray-100">
        <div class="flex items-center justify-between px-4 py-3 cursor-pointer active:bg-gray-50">
          <span class="text-sm text-gray-700">修改信息</span>
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
        <div class="flex items-center justify-between px-4 py-3 cursor-pointer active:bg-gray-50">
          <span class="text-sm text-gray-700">联系客服（咨询盖章/私章问题）</span>
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
        <div class="flex items-center justify-between px-4 py-3 cursor-pointer active:bg-gray-50">
          <span class="text-sm text-red-600">退出登录</span>
          <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部导航栏 -->
  <nav class="fixed bottom-0 w-[430px] bg-white border-t border-gray-200 flex shadow-lg">
    <div class="flex-1 flex flex-col items-center justify-center py-2 text-gray-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      <span class="text-xs mt-0.5">首页</span>
    </div>
    <div class="flex-1 flex flex-col items-center justify-center py-2 text-primary">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <span class="text-xs font-bold mt-0.5">我的</span>
    </div>
  </nav>

</body>
</html>
